<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Konglomerat — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- floating top tools -->
  <div style="position:fixed;top:18px;right:18px;z-index:50;display:flex;gap:10px;align-items:center">
    <div class="lang-switch">
      <button data-lang="uz" onclick="setLang('uz')">UZ</button>
      <button data-lang="ru" onclick="setLang('ru')">RU</button>
      <button data-lang="en" onclick="setLang('en')">EN</button>
    </div>
    <button class="icon-btn" data-theme-toggle onclick="toggleTheme()"></button>
  </div>

  <div class="auth-wrap">
    <div class="card auth-card">
      <a class="brand" href="index.html">
        <span class="logo-mark" data-icon="layers" data-icon-size="22"></span>
        <span class="logo-text">Konglomerat</span>
      </a>
      <h2 class="center mt-2" data-i18n="login.title">Вход в систему</h2>
      <p class="center muted" data-i18n="login.sub">Войдите в ваш аккаунт</p>

      <form id="loginForm" class="mt-3">
        <div class="form-group">
          <label data-i18n="login.email">Логин (Email)</label>
          <input id="loginEmail" class="form-control" type="text" autocomplete="username"
                 placeholder="admin" required />
        </div>
        <div class="form-group">
          <label data-i18n="login.password">Пароль</label>
          <input id="loginPass" class="form-control" type="password" autocomplete="current-password"
                 placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block" data-i18n="login.submit">Войти</button>
      </form>

      <div class="auth-hint" data-i18n="login.hint">Демо: admin / admin123 или company1 / company123</div>
      <p class="center mt-2"><a href="index.html" class="muted" data-i18n="login.back">Вернуться на главную</a></p>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
